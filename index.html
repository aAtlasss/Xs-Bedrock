<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xs Panel | Bedrock Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: var(--accent); margin-bottom: 5px; }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        .console {
            background: #000;
            color: #10b981;
            font-family: monospace;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 12px;
            text-align: left;
            height: 80px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Xs Panel</h1>
        <p style="opacity: 0.7;">Bedrock Edition v2.0</p>

        <div class="status-grid">
            <div class="stat-card">
                <div style="font-size: 0.8em; opacity: 0.6;">CPU</div>
                <div id="cpu-load">12%</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8em; opacity: 0.6;">RAM</div>
                <div>1.2 / 4 GB</div>
            </div>
        </div>

        <button class="btn" onclick="startServer()">ЗАПУСТИТИ СЕРВЕР</button>

        <div class="console" id="console">
            > Очікування команди...
        </div>
    </div>

    <script>
        function startServer() {
            const log = document.getElementById('console');
            log.innerHTML += "<br>> Запуск ядра...";
            setTimeout(() => { log.innerHTML += "<br>> Перевірка портів..."; }, 1000);
            setTimeout(() => { log.innerHTML += "<br>> <span style='color:yellow'>Сервер онлайн!</span>"; }, 2500);
        }

        // Симуляція навантаження CPU
        setInterval(() => {
            document.getElementById('cpu-load').innerText = Math.floor(Math.random() * 20 + 5) + "%";
        }, 3000);
    </script>
</body>
</html>
