<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xs Panel | Bedrock Edition</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: var(--accent); margin-bottom: 5px; }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        .console {
            background: #000;
            color: #10b981;
            font-family: monospace;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            font-size: 12px;
            text-align: left;
            height: 80px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>Xs Panel</h1>
        <p style="opacity: 0.7;">Bedrock Edition v2.0</p>

        <div class="status-grid">
            <div class="stat-card">
                <div style="font-size: 0.8em; opacity: 0.6;">CPU</div>
                <div id="cpu-load">12%</div>
            </div>
            <div class="stat-card">
                <div style="font-size: 0.8em; opacity: 0.6;">RAM</div>
                <div>1.2 / 4 GB</div>
            </div>
        </div>

        <button class="btn" onclick="startServer()">ЗАПУСТИТИ СЕРВЕР</button>

        <div class="console" id="console">
            > Очікування команди...
        </div>
    </div>

    <script>
        function startServer() {
            const log = document.getElementById('console');
            log.innerHTML += "<br>> Запуск ядра...";
            setTimeout(() => { log.innerHTML += "<br>> Перевірка портів..."; }, 1000);
            setTimeout(() => { log.innerHTML += "<br>> <span style='color:yellow'>Сервер онлайн!</span>"; }, 2500);
        }

        // Симуляція навантаження CPU
        setInterval(() => {
            document.getElementById('cpu-load').innerText = Math.floor(Math.random() * 20 + 5) + "%";
        }, 3000);
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xs Panel | Bedrock Edition</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #1c222d;
            --accent: #3b82f6;
            --text: #ffffff;
            --sec-text: #94a3b8;
            --orange: #e76f51;
            --green: #2ec4b6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 480px; }
        
        /* Мови */
        .lang-switcher { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 15px; }
        .lang-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 5px 12px; border-radius: 6px; cursor: pointer; }

        .panel {
            background: var(--card);
            padding: 20px; border-radius: 15px;
            border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* Ресурси */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; text-align: center; }

        /* Керування Світом */
        .world-section { background: #28303d; border-radius: 12px; padding: 15px; margin-top: 20px; }
        .world-info { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; font-size: 20px; font-weight: bold; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { border: none; border-radius: 6px; color: white; padding: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* AI Блок */
        .ai-box {
            margin-top: 25px; padding: 15px; border-radius: 12px;
            background: rgba(59, 130, 246, 0.05); border: 1px dashed var(--accent);
        }
        #ai-chat { display: none; background: #0f172a; padding: 10px; border-radius: 8px; margin-top: 10px; height: 120px; overflow-y: auto; font-size: 13px; }
        .ai-input-group { display: none; margin-top: 10px; gap: 5px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switcher">
        <button class="lang-btn" onclick="setLang('uk')">UA</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('ru')">RU</button>
    </div>

    <div class="panel">
        <h2 id="main-title">Панель Xs</h2>

        <div class="stats">
            <div class="stat-box">
                <div style="font-size: 12px; color: var(--sec-text);">CPU</div>
                <div id="cpu" style="color: var(--accent); font-weight: bold;">12%</div>
            </div>
            <div class="stat-box">
                <div style="font-size: 12px; color: var(--sec-text);">RAM</div>
                <div id="ram" style="font-weight: bold;">1.2 / 4 GB</div>
            </div>
        </div>

        <button class="btn" style="background: var(--accent); width: 100%; margin-bottom: 20px;" onclick="alert('Starting...')">▶ <span id="start-btn">ЗАПУСТИТИ СЕРВЕР</span></button>

        <div id="worlds-label" style="font-weight: bold; margin-bottom: 10px;">Світи</div>
        <div class="world-section">
            <div class="world-info">🌍 world_Seed</div>
            <div class="grid-btns">
                <button class="btn" style="background: var(--orange);">📤 <span class="t-up">Вивантажити</span></button>
                <button class="btn" style="background: #475569;">📁 <span class="t-file">Файли</span></button>
                <button class="btn" style="background: var(--green); grid-column: span 2;">🔄 <span class="t-gen">Згенерувати</span></button>
            </div>
        </div>

        <div class="ai-box">
            <div style="font-weight: bold; font-size: 18px;" id="ai-t">AI-асистент сервера</div>
            <p style="font-size: 13px; color: var(--sec-text);" id="ai-d">Керуйте сервером через природне спілкування.</p>
            <button class="btn" style="background: #1e293b; width: 100%; border: 1px solid #334155;" onclick="openAI()">🤖 <span id="ai-b">ШІ-керування сервером</span></button>
            
            <div id="ai-chat">🤖 Бот: Система готова. Яку команду виконати?</div>
            <div class="ai-input-group" id="ai-input">
                <input type="text" id="ai-msg" placeholder="...">
                <button class="btn" style="background: var(--accent); padding: 8px;" onclick="sendAI()">➜</button>
            </div>
        </div>
    </div>
</div>

<script>
    const trans = {
        uk: { title: "Панель Xs", start: "ЗАПУСТИТИ СЕРВЕР", worlds: "Світи", up: "Вивантажити", file: "Файли", gen: "Згенерувати", ait: "AI-асистент сервера", aid: "Керуйте сервером через природне спілкування.", aib: "ШІ-керування сервером" },
        en: { title: "Xs Panel", start: "START SERVER", worlds: "Worlds", up: "Upload", file: "Files", gen: "Generate", ait: "Server AI Assistant", aid: "Manage your server with natural conversation.", aib: "AI Server Control" },
        ru: { title: "Панель Xs", start: "ЗАПУСТИТЬ СЕРВЕР", worlds: "Миры", up: "Выгрузить", file: "Файлы", gen: "Сгенерировать", ait: "AI-ассистент сервера", aid: "Управляйте сервером через общение.", aib: "ИИ-управление сервером" }
    };

    function setLang(l) {
        document.getElementById('main-title').innerText = trans[l].title;
        document.getElementById('start-btn').innerText = trans[l].start;
        document.getElementById('worlds-label').innerText = trans[l].worlds;
        document.querySelectorAll('.t-up').forEach(e => e.innerText = trans[l].up);
        document.querySelectorAll('.t-file').forEach(e => e.innerText = trans[l].file);
        document.querySelectorAll('.t-gen').forEach(e => e.innerText = trans[l].gen);
        document.getElementById('ai-t').innerText = trans[l].ait;
        document.getElementById('ai-d').innerText = trans[l].aid;
        document.getElementById('ai-b').innerText = trans[l].aib;
    }

    function openAI() {
        document.getElementById('ai-chat').style.display = 'block';
        document.getElementById('ai-input').style.display = 'flex';
    }

    function sendAI() {
        let m = document.getElementById('ai-msg');
        let c = document.getElementById('ai-chat');
        if(!m.value) return;
        c.innerHTML += `<br><b>Ви:</b> ${m.value}`;
        setTimeout(() => { 
            c.innerHTML += `<br><span style="color:var(--accent)">🤖 Бот: Команда прийнята, аналізую...</span>`;
            c.scrollTop = c.scrollHeight;
        }, 600);
        m.value = "";
    }

    setInterval(() => { document.getElementById('cpu').innerText = Math.floor(Math.random() * 25 + 5) + "%"; }, 3000);
</script>

</body>
</html>
